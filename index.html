<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Приглашаю тебя кое-куда</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
height:100vh;
background:#111;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* Конверт */
.envelope{
position:relative;
width:320px;
height:200px;
background:#1c1c1c;
border-radius:12px;
cursor:pointer;
box-shadow:0 0 40px rgba(255,70,120,0.3);
transition:0.6s;
}

.flap{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(45deg,#ff416c,#ff4b2b);
clip-path:polygon(0 0,100% 0,50% 60%);
transform-origin:top;
transition:0.8s;
}

.letter{
position:absolute;
width:90%;
left:5%;
top:10%;
background:#222;
color:white;
padding:20px;
border-radius:15px;
opacity:0;
transform:translateY(30px);
transition:0.8s;
text-align:center;
}

.envelope.open .flap{
transform:rotateX(180deg);
}

.envelope.open .letter{
opacity:1;
transform:translateY(0);
}

h2{
margin-bottom:15px;
font-size:1.2rem;
}

p{
font-size:0.85rem;
line-height:1.6;
margin-bottom:15px;
opacity:0.9;
}

input{
padding:10px;
border-radius:20px;
border:none;
margin-bottom:15px;
width:100%;
text-align:center;
}

button{
padding:10px 18px;
border-radius:25px;
border:none;
cursor:pointer;
font-size:0.8rem;
transition:0.3s;
}

.yes{
background:linear-gradient(90deg,#ff416c,#ff4b2b);
color:white;
}

.no{
background:transparent;
border:1px solid rgba(255,255,255,0.4);
color:white;
margin-top:8px;
position:relative;
}

.result{
margin-top:10px;
font-size:0.8rem;
opacity:0;
transition:0.4s;
}
</style>
</head>

<body>

<div class="envelope" id="envelope">
<div class="flap"></div>

<div class="letter">
<h2>🌹</h2>
<p>
Ты до этого говорила: «я подумаю».<br><br>

Я понял, что если ждать твоего «подумаю», 
то можно дождаться и на пенсии 😄<br><br>

Поэтому выбора особо не осталось-пришлось сделать официальное цифровое приглашение.<br><br>

Просто кино. Просто вечер. 
И правильная компания. Ну я))
</p>

<input type="date" id="datePicker">

<button class="yes" onclick="sendToTelegram()">Согласиться</button>
<button class="no" id="noBtn">Подумать ещё</button>

<div class="result" id="result"></div>
</div>
</div>

<script>
const envelope=document.getElementById("envelope");
envelope.addEventListener("click",()=>{
envelope.classList.add("open");
});

const noBtn=document.getElementById("noBtn");

function moveButton(){
noBtn.style.left=Math.random()*60+"px";
noBtn.style.top=Math.random()*40+"px";
}

noBtn.addEventListener("mouseover",moveButton);
noBtn.addEventListener("touchstart",function(e){
e.preventDefault();
moveButton();
});

function sendToTelegram(){
const date=document.getElementById("datePicker").value;
if(!date){
const result=document.getElementById("result");
result.style.opacity="1";
result.innerHTML="Выбери дату сначала 😉";
return;
}

const text=`Я согласна на кино ${date} 😉`;
const url=`https://t.me/bakaiiiiii?text=${encodeURIComponent(text)}`;

window.location.href=url;
}
</script>

</body>
</html>
