<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Приглашение для Розы</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

/* Фон на весь сайт */
body{
min-height:100vh;
background:linear-gradient(45deg,#ff416c,#ff4b2b,#1e90ff,#ff416c);
background-size:400% 400%;
animation:gradientMove 12s ease infinite;
color:white;
overflow-y:auto;
padding:40px 15px;
}

/* Анимация фона */
@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Центрирование блока */
.envelope{
position:relative;
width:100%;
max-width:380px;
height:220px;
background:rgba(0,0,0,0.75);
border-radius:15px;
cursor:pointer;
box-shadow:0 0 40px rgba(0,0,0,0.5);
transition:0.6s;
margin:0 auto;
backdrop-filter:blur(10px);
}

.flap{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(45deg,#ff416c,#ff4b2b);
clip-path:polygon(0 0,100% 0,50% 60%);
transform-origin:top;
transition:0.8s;
}

.letter{
position:absolute;
width:92%;
left:4%;
top:15%;
background:rgba(20,20,20,0.95);
padding:22px;
border-radius:15px;
opacity:0;
transform:translateY(30px);
transition:0.8s;
text-align:center;
}

.envelope.open .flap{
transform:rotateX(180deg);
}

.envelope.open .letter{
opacity:1;
transform:translateY(0);
}

h2{
margin-bottom:15px;
font-size:1.3rem;
}

p{
font-size:0.9rem;
line-height:1.7;
margin-bottom:18px;
}

input{
padding:10px;
border-radius:20px;
border:none;
margin-bottom:15px;
width:100%;
text-align:center;
font-size:0.9rem;
}

button{
padding:11px 20px;
border-radius:25px;
border:none;
cursor:pointer;
font-size:0.85rem;
transition:0.3s;
}

.yes{
background:linear-gradient(90deg,#ff416c,#ff4b2b);
color:white;
}

.yes:hover{
transform:scale(1.05);
}

.no{
background:transparent;
border:1px solid rgba(255,255,255,0.6);
color:white;
margin-top:10px;
position:relative;
}

.result{
margin-top:12px;
font-size:0.85rem;
opacity:0;
transition:0.4s;
}
</style>
</head>

<body>

<div class="envelope" id="envelope">
<div class="flap"></div>

<div class="letter">
<h2>Роза 🌹</h2>

<p>
Ты до этого говорила: «я подумаю».<br><br>

Я понял, что если ждать твоего «подумаю», 
то можно дождаться пенсии 😄<br><br>

Поэтому пришлось немного схитрить
и сделать для тебя персональное приглашение.<br><br>

Просто кино. Просто вечер.<br>
И я))
</p>

<input type="date" id="datePicker">

<button class="yes" onclick="sendToTelegram()">Согласиться</button>
<br>
<button class="no" id="noBtn">Подумать ещё</button>

<div class="result" id="result"></div>

</div>
</div>

<script>
const envelope=document.getElementById("envelope");

envelope.addEventListener("click",(e)=>{
if(!e.target.closest("button") && e.target.tagName !== "INPUT"){
envelope.classList.add("open");
}
});

const noBtn=document.getElementById("noBtn");

function moveButton(){
noBtn.style.left=Math.random()*80+"px";
noBtn.style.top=Math.random()*40+"px";
}

noBtn.addEventListener("mouseover",moveButton);
noBtn.addEventListener("touchstart",function(e){
e.preventDefault();
moveButton();
});

function sendToTelegram(){
const date=document.getElementById("datePicker").value;

if(!date){
const result=document.getElementById("result");
result.style.opacity="1";
result.innerHTML="Сначала выбери дату 😉";
return;
}

const text=`Я согласна на кино ${date} 😉`;
const url=`https://t.me/bakaiiiiii?text=${encodeURIComponent(text)}`;

window.location.href=url;
}
</script>

</body>
</html>
